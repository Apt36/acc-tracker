<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Accora Brain</title>
<style>
:root{
  --bg:#080B14;--surface:#0F1220;--card:#161929;--card2:#1D2138;--border:#252840;
  --teal:#00D4F0;--gold:#FFB347;--red:#FF4D5E;--green:#00D4A3;--orange:#FF7A45;--purple:#9D7FFF;
  --text:#E4E6F0;--muted:#5A5E7A;--muted2:#3A3E58;
  --hold-bg:#2A1A0A;--hold-bd:rgba(255,122,69,.4);--hold-text:#FF9F6A;
  --urgent:#FF2D55;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:-apple-system,'SF Pro Display','Segoe UI',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}

/* ─── HEADER ─────────────────────────────────────────────────── */
.hdr{position:sticky;top:0;z-index:200;background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.hdr-left{display:flex;flex-direction:column}
.hdr-title{font-size:17px;font-weight:800;letter-spacing:-.3px}
.hdr-sub{font-size:10px;color:var(--muted);margin-top:1px}
.hdr-actions{display:flex;align-items:center;gap:8px}
.hdr-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.hdr-btn:hover{border-color:var(--muted)}
.hdr-btn.on{border-color:var(--teal);color:var(--teal);background:rgba(0,212,240,.08)}
.hdr-btn.prospect-active{border-color:var(--gold);color:var(--gold);background:rgba(255,179,71,.1)}
.hdr-btn svg{width:14px;height:14px;flex-shrink:0}

/* ─── TOP TAB BAR ─────────────────────────────────────────────── */
.top-tabs{position:sticky;top:57px;z-index:190;background:var(--surface);border-bottom:1px solid var(--border);display:flex}
.top-tab{flex:1;padding:12px 8px;font-size:13px;font-weight:700;color:var(--muted);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;letter-spacing:-.1px}
.top-tab.active{color:var(--teal);border-bottom-color:var(--teal)}

main{padding:0 0 24px}
.view{display:none}.view.active{display:block}

/* ─── FILTERS (compact, single row) ─────────────────────────── */
.filter-bar{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border)}
.filter-bar::-webkit-scrollbar{display:none}
.fsel{flex-shrink:0;padding:7px 10px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;font-weight:500;outline:none;cursor:pointer;appearance:none;-webkit-appearance:none}
.fsel:focus{border-color:var(--teal)}
.ftoggle{flex-shrink:0;padding:7px 12px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .12s;white-space:nowrap}
.ftoggle.active{border-color:var(--teal);color:var(--teal);background:rgba(0,212,240,.08)}
.ftoggle.smart.active{border-color:var(--urgent);color:var(--urgent);background:rgba(255,45,85,.08)}

/* ─── SMART PICKS ────────────────────────────────────────────── */
.smart-section{padding:12px 16px 0}
.smart-hdr{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.smart-title{font-size:12px;font-weight:700;color:var(--urgent);text-transform:uppercase;letter-spacing:.5px}
.smart-sub{font-size:11px;color:var(--muted)}
.smart-scroll{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;padding-bottom:10px}
.smart-scroll::-webkit-scrollbar{display:none}
.smart-card{flex-shrink:0;width:220px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;cursor:pointer;border-top:3px solid}
.smart-card:hover{background:var(--card2)}
.sc-rank{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.sc-unit{font-size:16px;font-weight:800}
.sc-bld{font-size:11px;color:var(--teal);font-weight:600;margin-top:1px}
.sc-rent{font-size:13px;font-weight:700;color:var(--text);margin-top:4px}
.sc-lost{font-size:11px;color:var(--urgent);font-weight:600;margin-top:1px}
.sc-badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;border-radius:6px;margin-top:5px;background:rgba(255,179,71,.15);color:var(--gold)}

/* ─── PROPERTY LIST ──────────────────────────────────────────── */
.prop-list{padding:10px 16px;display:flex;flex-direction:column;gap:8px}
.prop-row{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;cursor:pointer;transition:background .12s;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.prop-row:hover{background:var(--card2)}
.prop-row.has-hold{border-color:var(--hold-bd)}
.prop-row.has-promo{border-left:3px solid var(--gold)}
.pr-left{flex:1;min-width:0}
.pr-code{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase}
.pr-name{font-size:15px;font-weight:800;color:var(--text);margin-top:2px}
.pr-addr{font-size:11px;color:var(--muted);margin-top:1px}
.pr-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.pr-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px}
.prb-promo{background:rgba(255,179,71,.15);color:var(--gold)}
.prb-hold{background:rgba(255,122,69,.12);color:var(--orange)}
.prb-bp{background:rgba(0,212,240,.08);color:var(--muted)}
.prb-util{font-size:10px;font-weight:600}
.pr-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.pr-count{font-size:22px;font-weight:800;color:var(--teal);line-height:1}
.pr-count-lbl{font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.pr-beds{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.pr-bed-pill{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--card2);color:var(--muted);font-weight:600}
.pr-chevron{color:var(--muted);margin-top:4px}

/* ─── PROPERTY DETAIL ────────────────────────────────────────── */
.detail-back{padding:10px 16px;display:flex;align-items:center;gap:8px;cursor:pointer;border-bottom:1px solid var(--border);background:var(--surface)}
.detail-back-btn{background:none;border:none;color:var(--teal);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px}
.detail-prop-bar{padding:12px 16px 10px;border-bottom:1px solid var(--border)}
.dpb-name{font-size:15px;font-weight:800}
.dpb-addr{font-size:11px;color:var(--muted);margin-top:1px}
.dpb-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}

/* ─── UNIT CARDS ─────────────────────────────────────────────── */
.unit-list{padding:12px 16px;display:flex;flex-direction:column;gap:12px}
.unit-card{background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden}
.unit-card.on-hold{border-color:var(--hold-bd)}
.unit-card.brain-pick{border-top:3px solid var(--urgent)}
.hold-chip{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;color:var(--orange);background:rgba(255,122,69,.13);padding:2px 7px;border-radius:6px;cursor:pointer;border:1px solid rgba(255,122,69,.25);user-select:none;white-space:nowrap}
.hold-banner{display:none;align-items:center;gap:8px;padding:8px 14px;background:var(--hold-bg);border-bottom:1px solid var(--hold-bd)}
.unit-card.hold-expanded .hold-banner{display:flex}
.hold-banner-lbl{font-size:11px;font-weight:800;color:var(--orange);text-transform:uppercase;letter-spacing:.3px}
.hold-banner-detail{font-size:11px;color:var(--hold-text);margin-left:auto;text-align:right}
.hold-until-str{font-size:10px;color:var(--muted)}
.detail-filter-bar{padding:0 16px 10px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.dfsel{background:var(--card2);border:1px solid var(--border);color:var(--text);font-size:12px;padding:5px 10px;border-radius:8px;outline:none;cursor:pointer;min-width:0}
.df-toggle{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:5px 10px;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:var(--muted);cursor:pointer;user-select:none}
.df-toggle.active{background:rgba(157,127,255,.15);color:var(--purple);border-color:rgba(157,127,255,.4)}
.df-date{background:var(--card2);border:1px solid var(--border);color:var(--text);font-size:12px;padding:5px 10px;border-radius:8px;outline:none;cursor:pointer;max-width:140px}
.df-date::-webkit-calendar-picker-indicator{filter:invert(0.6)}
/* Detail table */
.detail-table{width:100%;border-collapse:collapse;font-size:13px}
.detail-table th{padding:8px 10px;text-align:left;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid var(--border);white-space:nowrap;user-select:none}
.detail-table th.sortable{cursor:pointer}
.detail-table th.sortable:hover{color:var(--text)}
.sort-arrow{margin-left:3px;opacity:.5;font-size:9px}
.detail-table th.sort-active .sort-arrow{opacity:1;color:var(--teal)}
.detail-table td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.detail-table tr:hover td{background:rgba(255,255,255,.03)}
.detail-table tr:last-child td{border-bottom:none}
.days-cell{cursor:pointer;min-width:38px;pointer-events:auto!important}
.days-cell.revealed{filter:none!important}
.hold-pill-sm{font-size:10px;font-weight:700;color:var(--orange);background:rgba(255,122,69,.13);padding:2px 7px;border-radius:6px;cursor:pointer;border:1px solid rgba(255,122,69,.25);white-space:nowrap}
.hold-pill-sm.hold-expiring{color:#fff;background:rgba(255,77,94,.7);border-color:var(--red);animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.65}}
.in-place-note{font-size:10px;color:var(--green);font-style:italic;display:block;margin-top:2px}
.clear-filter-btn{font-size:11px;color:var(--muted);background:none;border:1px solid var(--border);padding:4px 10px;border-radius:8px;cursor:pointer;white-space:nowrap;font-weight:600}
.clear-filter-btn:hover{color:var(--text)}

.unit-hdr{padding:12px 14px 8px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.unit-id{font-size:20px;font-weight:800}
.unit-bld{font-size:11px;font-weight:700;color:var(--teal);margin-top:1px}
.unit-bld-addr{font-weight:400;color:var(--muted)}
.unit-type-row{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap}
.unit-type-txt{font-size:12px;color:var(--muted)}
.util-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px}
.price-block{text-align:right;flex-shrink:0}
.mkt-rent{font-size:20px;font-weight:800}
.mkt-mo{font-size:10px;color:var(--muted)}

/* Brain pick badge */
.brain-badge{font-size:9px;font-weight:800;color:var(--urgent);background:rgba(255,45,85,.12);padding:2px 7px;border-radius:6px;letter-spacing:.4px;text-transform:uppercase}
.urgent-loss{font-size:10px;color:var(--urgent);font-weight:600;margin-top:2px}

/* Feature chips */
.feat-row{display:flex;gap:5px;padding:0 14px 8px;flex-wrap:wrap}
.feat-chip{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;background:var(--card2);color:var(--muted);border:1px solid var(--border)}
.feat-chip.laundry{background:rgba(0,212,163,.1);color:var(--green);border-color:transparent}
.feat-chip.ac{background:rgba(0,212,240,.1);color:var(--teal);border-color:transparent}
.feat-chip.fb{background:rgba(157,127,255,.1);color:var(--purple);border-color:transparent}
.feat-chip.basement{background:rgba(90,94,122,.2);color:var(--muted);border-color:transparent}
.feat-chip.parking{background:rgba(244,162,97,.1);color:var(--gold);border-color:transparent}
.feat-chip.twin{background:rgba(0,212,240,.06);color:var(--muted);border-color:transparent;font-size:10px}

/* Promo banner */
.promo-banner{margin:0 12px 8px;border-radius:10px;padding:11px 13px;background:linear-gradient(135deg,rgba(255,179,71,.12),rgba(255,179,71,.05));border:1px solid rgba(255,179,71,.3)}
.promo-tag{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.promo-tag-badge{font-size:9px;font-weight:800;background:var(--gold);color:#1A0A00;padding:2px 7px;border-radius:6px;letter-spacing:.5px}
.promo-tag-lbl{font-size:12px;font-weight:700;color:var(--gold)}
.promo-rates{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pr-rate-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.pr-rate-val{font-size:14px;font-weight:800;margin-top:1px}
.pr-rate-sub{font-size:10px;color:var(--muted)}
.promo-savings{margin-top:7px;padding-top:7px;border-top:1px solid rgba(255,179,71,.2);font-size:12px;color:var(--gold);font-weight:600}

/* Closing offer */
.bp-section{margin:0 12px 8px;background:rgba(0,212,240,.05);border:1px solid rgba(0,212,240,.15);border-radius:10px;padding:11px 13px}
.bp-title{font-size:9px;font-weight:800;color:var(--teal);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.bp-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.bp-lbl{font-size:12px;color:var(--muted)}
.bp-val{font-size:13px;font-weight:700;color:var(--teal)}
.bp-val.mkt{color:var(--muted)}
.bp-note{font-size:10px;color:var(--muted);margin-top:5px;font-style:italic}
.bp-gc-lbl{font-size:12px;font-weight:700;color:var(--gold)}

/* Card footer */
.unit-footer{padding:10px 14px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.unit-meta{display:flex;gap:10px;flex-wrap:wrap}
.meta-item{display:flex;flex-direction:column}
.meta-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.meta-val{font-size:12px;font-weight:600;margin-top:1px}
.status-chip{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap}
.s-ur{background:rgba(0,212,163,.15);color:var(--green)}
.s-unr{background:rgba(255,77,94,.12);color:var(--red)}
.s-rr{background:rgba(157,127,255,.15);color:var(--purple)}
.s-hold{background:rgba(255,122,69,.15);color:var(--orange)}
.s-notice{background:rgba(157,127,255,.12);color:var(--purple)}

/* Heat dots */
.heat-hot{color:#FF2D55}.heat-warm{color:#FF9F0A}.heat-cool{color:var(--teal)}.heat-cold{color:var(--muted)}
/* Stage + contact badges */
.stage-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.3px}
.stage-lead{background:rgba(90,94,122,.2);color:var(--muted)}
.stage-shown{background:rgba(0,212,163,.12);color:var(--green)}
.stage-app_pending{background:rgba(157,127,255,.15);color:var(--purple)}
.stage-withdrew{background:rgba(255,77,94,.12);color:var(--red)}
/* Show count */
.show-count-badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;background:rgba(0,212,240,.1);color:var(--teal);white-space:nowrap}
/* Show-in-place suggestion */
.show-in-place{margin:4px 14px 8px;padding:6px 10px;border-radius:8px;background:rgba(0,212,163,.07);border:1px solid rgba(0,212,163,.2);display:flex;align-items:center;gap:6px;font-size:11px;color:var(--green);cursor:pointer}
.show-in-place strong{font-weight:700}
/* Reaction */
.reaction-loved{color:#FF2D55}.reaction-liked{color:var(--gold)}.reaction-neutral{color:var(--muted)}.reaction-disliked{color:var(--red)}
/* Amenity filter chips */
.amenity-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:5px 10px;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:var(--muted);cursor:pointer;user-select:none;white-space:nowrap}
.amenity-chip.active{background:rgba(0,212,240,.12);color:var(--teal);border-color:rgba(0,212,240,.35)}

/* Prospect shown/interested buttons on card */
.card-prospect-row{padding:8px 14px;border-top:1px solid var(--border);display:flex;gap:8px}
.cp-btn{flex:1;padding:6px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center}
.cp-btn.shown{border-color:var(--teal);color:var(--teal);background:rgba(0,212,240,.08)}
.cp-btn.interested{border-color:var(--gold);color:var(--gold);background:rgba(255,179,71,.1)}

/* ─── PRIVACY ────────────────────────────────────────────────── */
.private-hidden{filter:blur(5px);user-select:none;pointer-events:none;transition:filter .2s}
.privacy-off .private-hidden{filter:none}

/* ─── VACANCY TAB ────────────────────────────────────────────── */
.private-lock{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;text-align:center;gap:12px}
.private-lock-msg{font-size:15px;font-weight:700;color:var(--muted)}
.private-lock-sub{font-size:13px;color:var(--muted2)}
.unlock-btn{padding:10px 24px;border-radius:10px;border:1.5px solid var(--teal);background:transparent;color:var(--teal);font-size:14px;font-weight:700;cursor:pointer}
.kpi-strip{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:12px 16px}
.kpi{background:var(--card);border-radius:12px;padding:14px;border:1px solid var(--border)}
.kpi-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.kpi-val{font-size:22px;font-weight:800;margin:4px 0 2px;letter-spacing:-.5px}
.kpi-sub{font-size:11px;color:var(--muted)}
.kpi.red .kpi-val{color:var(--red)}.kpi.gold .kpi-val{color:var(--gold)}.kpi.teal .kpi-val{color:var(--teal)}.kpi.green .kpi-val{color:var(--green)}
.holds-panel{margin:0 16px 12px;background:var(--hold-bg);border:1px solid var(--hold-bd);border-radius:12px;overflow:hidden}
.holds-panel-hdr{padding:8px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--hold-bd);cursor:pointer;user-select:none}
.holds-panel-hdr:hover{background:rgba(255,255,255,.03)}
.holds-panel-title{font-size:12px;font-weight:700;color:var(--orange)}
.holds-panel-count{font-size:11px;color:var(--muted);margin-left:auto}
.holds-panel-chevron{font-size:10px;color:var(--muted);margin-left:4px;transition:transform .2s}
.holds-panel.collapsed .holds-panel-chevron{transform:rotate(-90deg)}
.holds-panel.collapsed .hold-rows{display:none}
.hold-rows{}
.hold-row{padding:4px 12px;border-bottom:1px solid var(--hold-bd);display:grid;grid-template-columns:80px 1fr 1fr 72px;align-items:center;gap:8px;font-size:11px}
.hold-row:last-child{border-bottom:none}
.hold-unit-lbl{font-weight:700;font-size:12px;white-space:nowrap}
.hold-prop-lbl{color:var(--muted);font-size:10px}
.hold-agent-lbl{font-weight:600;color:var(--hold-text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hold-exp-lbl{font-size:10px;color:var(--muted);text-align:right;white-space:nowrap}
.hold-exp-lbl.soon{color:var(--red);font-weight:700}
.soon{color:var(--orange)}
.vac-table-wrap{padding:0 16px;overflow-x:auto}
.vac-table{width:100%;border-collapse:collapse;font-size:13px;min-width:480px}
.vac-table th{padding:9px 10px;text-align:left;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);background:var(--bg)}
.vac-table td{padding:9px 10px;border-bottom:1px solid var(--border)}
.vac-table tr:last-child td{border-bottom:none}
.vac-table tr:hover td{background:rgba(255,255,255,.02)}
.hold-pill{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;background:rgba(255,122,69,.15);color:var(--orange);padding:2px 7px;border-radius:10px}
.aging-row{display:flex;gap:6px;padding:0 16px 12px;overflow-x:auto;scrollbar-width:none}
.aging-row::-webkit-scrollbar{display:none}
.age-bkt{flex:1;min-width:66px;border-radius:10px;padding:10px;text-align:center;cursor:pointer;transition:opacity .15s}
.age-bkt.dim{opacity:.3}
.age-bkt-lbl{font-size:9px;font-weight:700;color:rgba(255,255,255,.7)}
.age-bkt-count{font-size:20px;font-weight:800;color:#fff;line-height:1;margin:3px 0}

.panel-hdr{padding:12px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.panel-title{font-size:16px;font-weight:800}

.prospect-list{padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.prospect-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .12s}

.prospect-avatar{width:40px;height:40px;border-radius:50%;background:var(--card2);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:var(--teal);flex-shrink:0}
.prospect-info{flex:1;min-width:0}
.prospect-name{font-size:14px;font-weight:700}
.prospect-req{font-size:11px;color:var(--muted);margin-top:2px}
.prospect-stats{font-size:10px;color:var(--muted);margin-top:3px}
.prospect-status-chip{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;flex-shrink:0}
.ps-active{background:rgba(0,212,163,.15);color:var(--green)}
.ps-lost{background:rgba(255,77,94,.12);color:var(--red)}

.add-prospect-btn{display:flex;align-items:center;gap:8px;width:calc(100% - 32px);margin:0 16px;padding:12px 16px;border-radius:12px;border:1.5px dashed var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}

/* Add prospect form */
.add-form{padding:16px}
.form-back{background:none;border:none;color:var(--teal);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px;margin-bottom:14px}
.form-row{margin-bottom:12px}
.form-lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;display:block}

.bed-toggle{padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:all .12s}
.bed-toggle.sel{border-color:var(--teal);color:var(--teal);background:rgba(0,212,240,.08)}
.form-save{width:100%;padding:13px;border-radius:12px;border:none;background:var(--teal);color:#000;font-size:15px;font-weight:800;cursor:pointer;margin-top:6px}

.pd-avatar{width:48px;height:48px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:var(--teal);flex-shrink:0}
.pd-name{font-size:16px;font-weight:800}
.pd-req{font-size:12px;color:var(--muted);margin-top:3px}
.pd-back{background:none;border:none;color:var(--teal);font-size:22px;cursor:pointer;margin-left:auto;line-height:1}

.pd-section-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.pd-unit-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.pd-unit-row:last-child{border-bottom:none}
.pd-unit-lbl{font-size:13px;font-weight:700}
.pd-unit-sub{font-size:11px;color:var(--muted)}
.pd-unit-action{font-size:12px;font-weight:700;padding:4px 10px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer}
.pd-unit-action.remove{border-color:rgba(255,77,94,.4);color:var(--red)}
.pd-notes{width:100%;padding:10px 13px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;outline:none;resize:none;min-height:80px}
.pd-status-row{display:flex;gap:8px;margin-top:10px}
.pd-status-btn{flex:1;padding:9px;border-radius:10px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
.pd-status-btn.active-s{border-color:var(--green);color:var(--green)}
.pd-status-btn.lost-s{border-color:var(--red);color:var(--red)}
.pd-del{width:100%;padding:11px;border-radius:10px;border:1.5px solid rgba(255,77,94,.3);background:transparent;color:var(--red);font-size:13px;font-weight:700;cursor:pointer;margin-top:10px}

/* ─── IMPORT MODAL ───────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:400;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:20px;border:1px solid var(--border);width:100%;max-width:480px;overflow:hidden}
.modal-hdr{padding:18px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}

.modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1}
.modal-body{padding:18px 20px;display:flex;flex-direction:column;gap:14px}
.import-row{display:flex;flex-direction:column;gap:6px}
.import-lbl{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.import-file-btn{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:10px;border:1.5px dashed var(--border);background:var(--card);cursor:pointer;transition:border-color .15s}
.import-file-btn:hover{border-color:var(--teal)}
.import-file-name{font-size:13px;color:var(--muted);flex:1}
.import-file-name.loaded{color:var(--green);font-weight:600}
.import-apply{width:100%;padding:13px;border-radius:12px;border:none;background:var(--teal);color:#000;font-size:15px;font-weight:800;cursor:pointer;margin-top:4px}
.import-apply:disabled{opacity:.4;cursor:not-allowed}
.import-status{font-size:12px;text-align:center;color:var(--muted);margin-top:-4px}
.import-status.ok{color:var(--green)}.import-status.err{color:var(--red)}

/* ─── TOAST ──────────────────────────────────────────────────── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card2);color:var(--text);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;border:1px solid var(--border);z-index:500;transition:transform .25s;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ─── RESULT COUNT ───────────────────────────────────────────── */
.result-count{padding:6px 16px;font-size:12px;color:var(--muted)}

/* ─── RESPONSIVE ─────────────────────────────────────────────── */
@media(min-width:640px){
  .kpi-strip{grid-template-columns:repeat(4,1fr)}

}

}

function getBeds(t){
  if(!t)return null;
  if(t.startsWith('0_'))return 0;
  if(t.startsWith('1_'))return 1;
  if(t.startsWith('2_'))return 2;
  if(t.startsWith('3_')||t.startsWith('3'))return 3;
  if(t.startsWith('4'))return 4;
  return null;
}

function getPromo(property,typeCode,days){
  const code=propInfo(property).code,beds=getBeds(typeCode);
  if(code==='004'){
    if(days>=200)return{active:true,label:'2 Months FREE',desc:'Summer promo — vacant 100+ days',free_months:2,backPocket:null,bpNote:'2-month promo unit — check with manager before any additional discount'};
    return{active:false,label:null,desc:'',backPocket:null};
  }
  if(code==='010')return{active:true,label:'1 Month FREE',desc:'Summer promo — all Orion units',free_months:1,backPocket:{type:'gc',label:'$200 Bayshore Gift Card',note:'Use only when at risk of losing the prospect'}};
  if(code==='013'){
    if(beds===1)return{active:true,label:'1 Month FREE · 1 BR',desc:'1-bedroom summer promotion',free_months:1,backPocket:{type:'discount',divisor:7,months:7,note:'7 months discounted, reverts to market at month 8'}};
    return{active:true,label:'2 Months FREE · 2 BR',desc:'2-bedroom summer promotion',free_months:2,backPocket:null,bpNote:'Check with manager before any additional discount'};
  }
  const hasBP=['002','006','008','011','012','014','015'].includes(code);
  if(hasBP)return{active:false,label:null,desc:'',backPocket:{type:'discount',divisor:8,months:8,note:'8 months discounted, reverts to market at month 9'}};
  return{active:false,label:null,desc:'',backPocket:null};
}
function calcPromo(rent,promo){
  if(!promo.active)return null;
  const effective=Math.round(rent*(12-promo.free_months)/12);
  return{effective,savings:rent*promo.free_months,free:promo.free_months,monthlyDiscount:rent-effective};
}
function calcBP(rent,promo){
  if(!promo||!promo.backPocket)return null;
  const bp=promo.backPocket;
  if(bp.type==='gc')return{type:'gc',label:bp.label,note:bp.note};
  const disc=Math.round(rent/bp.divisor);
  return{type:'discount',months:bp.months,discount:disc,discounted:rent-disc,note:bp.note};
}

function urgencyScore(u){
  const dailyLoss=u.rent/30;
  return Math.round(u.days*dailyLoss);
}
function getTopPriority(n=6){
  return [...availUnits]
    .filter(u=>!isOnHold(u.property,u.unit)&&u.status!=='Rented Ready'&&u.days>0)
    .sort((a,b)=>urgencyScore(b)-urgencyScore(a))
    .slice(0,n);
}

function loadProspects(){
  try{
    const stored=JSON.parse(localStorage.getItem('accora_prospects')||'[]');
    if(stored.length)return stored;
  }catch{}
  return JSON.parse(JSON.stringify(PROSPECT_SEED));
}
function saveProspects(p){localStorage.setItem('accora_prospects',JSON.stringify(p));}

function getShownKeys(p){return(p.shownUnits||[]).map(s=>typeof s==='string'?s:s.key);}
function getShownEntry(p,key){return(p.shownUnits||[]).find(s=>(typeof s==='string'?s:s.key)===key)||null;}
function getUnitShowCount(property,unit){
  const key=property+'|'+unit;
  return prospects.filter(p=>getShownKeys(p).includes(key)).length;
}

function getProspect(id){return prospects.find(p=>p.id===id)||null;}
function setProspectActive(id){
  state.activeProspectId=id;
  const btn=document.getElementById('prospectBtn');
  const lbl=document.getElementById('prospectBtnLbl');
  if(id){
    const p=getProspect(id);
    btn.classList.add('prospect-active');
    lbl.textContent=p?p.name.split(' ')[0]:'Prospect';
  }else{
    btn.classList.remove('prospect-active');
    lbl.textContent='Prospects';
  }
  renderPropList();
}

// ─── FILTER UNITS ─────────────────────────────────────────────────
function getFilteredUnits(propName){
  let data=propName?availUnits.filter(u=>u.property===propName):[...availUnits];
  if(state.hideHeld)data=data.filter(u=>!isOnHold(u.property,u.unit));
  if(propName){
    // In detail view: use detail-scoped filters; ignore main bar size/status
    const df=state.detailFilters;
    if(df.fbOnly)data=data.filter(u=>(u.fp_code||u.type||'').includes('_FB'));
    if(df.priceMax!=='')data=data.filter(u=>u.rent<=parseInt(df.priceMax));
    if(df.status==='On Hold')data=data.filter(u=>isOnHold(u.property,u.unit));
    else if(df.status==='On Notice')data=data.filter(u=>u.status==='Notice Unrented');
    else if(df.status)data=data.filter(u=>u.status===df.status);
    if(df.dateBy!==''){
      const by=new Date(df.dateBy+'T00:00:00');
      data=data.filter(u=>{
        if(u.status==='Notice Unrented')return u.date_avail?new Date(u.date_avail+'T00:00:00')<=by:false;
        if(!u.date_avail)return true;
        return new Date(u.date_avail+'T00:00:00')<=by;
      });
    }
    // Detail sort
    const dsort=df.sort||'days-desc';
    data.sort((a,b)=>{
      if(dsort==='unit-asc')return a.unit.localeCompare(b.unit,undefined,{numeric:true,sensitivity:'base'});
      if(dsort==='unit-desc')return b.unit.localeCompare(a.unit,undefined,{numeric:true,sensitivity:'base'});
      if(dsort==='rent-asc')return a.rent-b.rent;
      if(dsort==='rent-desc')return b.rent-a.rent;
      if(dsort==='days-asc')return a.days-b.days;
      return b.days-a.days;
    });
    return data;
  }
  const sz=document.getElementById('availSize')?.value||'';
  if(sz!=='')data=data.filter(u=>getBeds(u.type||u.fp_code)===parseInt(sz));
  const st=document.getElementById('availStatus')?.value||'';
  if(st==='On Hold')data=data.filter(u=>isOnHold(u.property,u.unit));
  else if(st)data=data.filter(u=>u.status===st);
  // Prospect filter: if active prospect, filter by their beds/budget
  if(state.activeProspectId){
    const p=getProspect(state.activeProspectId);
    if(p&&p.beds&&p.beds.length)data=data.filter(u=>p.beds.includes(getBeds(u.type||u.fp_code)));
    if(p&&p.budgetMax)data=data.filter(u=>u.rent<=p.budgetMax);
  }
  // Price filter (main list)
  const maxP=document.getElementById('availPrice')?.value||'';
  if(maxP!=='')data=data.filter(u=>u.rent<=parseInt(maxP));
  {
    const sort=document.getElementById('availSort')?.value||'days-desc';
    data.sort((a,b)=>{
      if(!state.hideHeld){const ah=isOnHold(a.property,a.unit)?0:1,bh=isOnHold(b.property,b.unit)?0:1;if(ah!==bh)return ah-bh;}
      if(state.smartMode)return urgencyScore(b)-urgencyScore(a);
      if(sort==='days-desc')return b.days-a.days;
      if(sort==='days-asc')return a.days-b.days;
      if(sort==='unit-asc')return a.unit.localeCompare(b.unit,undefined,{numeric:true,sensitivity:'base'});
      if(sort==='rent-asc')return a.rent-b.rent;
      if(sort==='rent-desc')return b.rent-a.rent;
      return 0;
    });
  }
  return data;
}

function renderSmartPicks(){
  if(!state.smartMode){document.getElementById('smartPicksWrap').innerHTML='';return;}
  const top=getTopPriority(6);
  const urgColors=['#FF2D55','#FF453A','#FF6B35','#FF7A45','#FF9F0A','#FFB347'];
  const html=`<div class="smart-section">
    <div class="smart-hdr">
      <span class="smart-title">⚡ Brain's Priority Picks</span>
      <span class="smart-sub">Ranked by rent lost · tap to view unit</span>
    </div>
    <div class="smart-scroll">
      ${top.map((u,i)=>{
        const pi=propInfo(u.property);
        const promo=getPromo(u.property,u.type||u.fp_code,u.days);
        const score=urgencyScore(u);
        return `<div class="smart-card" style="border-top-color:${urgColors[i]||urgColors[5]}" onclick="drillTo('${u.property.replace(/'/g,"\'")}','${u.unit}')">
          <div class="sc-rank">#${i+1} Priority</div>
          <div class="sc-unit">${u.unit}</div>
          <div class="sc-bld">${pi.code} · ${pi.display}</div>
          <div class="sc-rent">$${u.rent.toLocaleString()}/mo</div>
          <div class="sc-lost">$${score.toLocaleString()} lost · ${u.days}d vacant</div>
          ${promo.active?`<div class="sc-badge">★ ${promo.label}</div>`:''}
        </div>`;
      }).join('')}
    </div>
  </div>`;
  document.getElementById('smartPicksWrap').innerHTML=html;
}

    if(state.hideHeld)units=units.filter(u=>!isOnHold(u.property,u.unit));
    if(sz!=='')units=units.filter(u=>getBeds(u.type||u.fp_code)===parseInt(sz));
    if(st==='On Hold')units=units.filter(u=>isOnHold(u.property,u.unit));
    else if(st)units=units.filter(u=>u.status===st);
    const maxP=document.getElementById('availPrice')?.value||'';
    if(maxP!=='')units=units.filter(u=>u.rent<=parseInt(maxP));
    if(prospect&&prospect.beds&&prospect.beds.length)units=units.filter(u=>prospect.beds.includes(getBeds(u.type||u.fp_code)));
    if(prospect&&prospect.budgetMax)units=units.filter(u=>u.rent<=prospect.budgetMax);
    if(!units.length)return '';

    const holdCount=DATA.holds.filter(h=>h.property===name).length;
    const promo=getPromo(name,'2_',0);
    const hasBP=['002','006','008','011','012','014','015'].includes(pi.code);
    const util=getUtility(name,'0');

    // Bed breakdown
    const bedCounts={};
    units.forEach(u=>{const b=getBeds(u.type||u.fp_code);if(b!==null){bedCounts[b]=(bedCounts[b]||0)+1;}});
    const bedPills=Object.entries(bedCounts).sort((a,b)=>a[0]-b[0]).map(([b,n])=>`<span class="pr-bed-pill">${bedsLabel(parseInt(b))} ×${n}</span>`).join('');

    return `<div class="prop-row ${holdCount?'has-hold':''} ${promo.active?'has-promo':''}" onclick="drillTo('${name.replace(/'/g,"\'")}',null)">
      <div class="pr-left">
        <div class="pr-code">${pi.code}</div>
        <div class="pr-name">${pi.display}</div>
        <div class="pr-addr">${pi.addr}</div>
        <div class="pr-badges">
          ${promo.active?`<span class="pr-badge prb-promo">★ ${promo.label}</span>`:''}
          ${hasBP&&!promo.active?'<span class="pr-badge prb-bp">Closing Offer Avail</span>':''}
          ${util?`<span class="pr-badge prb-util" style="background:${util.bg};color:${util.color}">${util.label}</span>`:''}
          ${holdCount?`<span class="pr-badge prb-hold">🔒 ${holdCount} on hold</span>`:''}
        </div>
        <div class="pr-beds" style="margin-top:8px">${bedPills}</div>
      </div>
      <div class="pr-right">
        <div><div class="pr-count">${units.length}</div><div class="pr-count-lbl">available</div></div>
        <svg class="pr-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </div>`;
  }).join('');

  document.getElementById('propList').innerHTML=html||'<div style="padding:40px;text-align:center;color:var(--muted);font-size:14px">No units match current filters.</div>';
}

// ─── DRILL INTO PROPERTY ──────────────────────────────────────────
function drillTo(prop,scrollToUnit){
  state.activeProp=prop;
  state.detailFilters={fbOnly:false,priceMax:'',dateBy:'',status:'',sort:'days-desc'};
  document.getElementById('listView').style.display='none';
  document.getElementById('detailView').style.display='block';
  document.getElementById('availFilterBar').style.display='none';
  renderDetailView();
  if(scrollToUnit){
    setTimeout(()=>{
      const el=document.querySelector(`[data-unit="${scrollToUnit}"]`);
      if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
    },100);
  }
}
function backToList(){
  state.activeProp=null;
  document.getElementById('detailView').style.display='none';
  document.getElementById('listView').style.display='block';
  document.getElementById('availFilterBar').style.display='';
  const ps=document.getElementById('availProp');
  if(ps)ps.value='';
  updateClearBtn();
  renderPropList();
}

function setDetailFilter(key,val){state.detailFilters[key]=val;renderDetailView();}
function resetDetailFilters(){state.detailFilters={fbOnly:false,priceMax:'',dateBy:'',status:'',sort:'days-desc'};renderDetailView();}

function renderDetailView(){
  const pi=propInfo(state.activeProp);
  const units=getFilteredUnits(state.activeProp);
  const hc=DATA.holds.filter(h=>h.property===state.activeProp).length;
  const promo=getPromo(state.activeProp,'2_',0);
  const util=getUtility(state.activeProp,'0',null);
  const hasBP=['002','006','008','011','012','014','015'].includes(pi.code);

  if(promo.active)badges+=`<span class="feat-chip" style="background:rgba(255,179,71,.15);color:var(--gold);border-color:transparent">★ ${promo.label}</span>`;

  getFeatures(state.activeProp,'','').filter(f=>f.key==='twin').forEach(f=>badges+=`<span class="feat-chip twin">${f.label}</span>`);

  document.getElementById('detailPropBar').innerHTML=`

  document.getElementById('detailFilterBar').innerHTML=`<div class="filter-bar" style="border-top:none;padding-top:8px">
    <select class="fsel" onchange="setDetailFilter('status',this.value)">
      <option value="" ${df.status===''?'selected':''}>All Status</option>
      <option value="Unrented Ready" ${df.status==='Unrented Ready'?'selected':''}>Ready Now</option>
      <option value="Unrented Not Ready" ${df.status==='Unrented Not Ready'?'selected':''}>Not Ready</option>
      <option value="On Notice" ${df.status==='On Notice'?'selected':''}>On Notice</option>
      <option value="On Hold" ${df.status==='On Hold'?'selected':''}>On Hold</option>
    </select>
    <select class="fsel" onchange="setDetailFilter('sort',this.value)">
      <option value="days-desc" ${df.sort==='days-desc'?'selected':''}>Oldest First</option>
      <option value="days-asc" ${df.sort==='days-asc'?'selected':''}>Newest First</option>
      <option value="unit-asc" ${df.sort==='unit-asc'?'selected':''}>Unit # A → Z</option>
      <option value="unit-desc" ${df.sort==='unit-desc'?'selected':''}>Unit # Z → A</option>
      <option value="rent-asc" ${df.sort==='rent-asc'?'selected':''}>Lowest Rent</option>
      <option value="rent-desc" ${df.sort==='rent-desc'?'selected':''}>Highest Rent</option>
    </select>
    <select class="fsel" onchange="setDetailFilter('priceMax',this.value)">
      <option value="">Any Price</option>${priceOptions}
    </select>
    ${isTH?`<span class="df-toggle ${df.fbOnly?'active':''}" onclick="setDetailFilter('fbOnly',${!df.fbOnly})" style="flex-shrink:0;padding:7px 10px;border-radius:10px;border:1px solid var(--border);background:var(--card);font-size:13px;font-weight:500;cursor:pointer">🏠 FB${df.fbOnly?' ✓':''}</span>`:''}
    ${hasFilter?`<span class="fsel" style="cursor:pointer;color:var(--muted)" onclick="resetDetailFilters()">✕ Clear</span>`:''}

  const curSort=df.sort||'days-desc';
  const sortIcon=(val)=>curSort===val+'-asc'?'↑':curSort===val+'-desc'?'↓':'↕';
  document.getElementById('detailCount').textContent=`${units.length} unit${units.length!==1?'s':''} available`;
  document.getElementById('detailUnits').innerHTML=`
    <table class="detail-table">

        <th class="sortable ${curSort.startsWith('unit')?'sort-active':''}" onclick="setDetailSort('unit')">Unit <span class="sort-arrow">${sortIcon('unit')}</span></th>
        <th>Type</th>
        <th>Status</th>
        <th class="sortable ${curSort.startsWith('days')?'sort-active':''}" onclick="setDetailSort('days')">Days <span class="sort-arrow">${sortIcon('days')}</span></th>
        <th class="sortable ${curSort.startsWith('rent')?'sort-active':''}" onclick="setDetailSort('rent')">Rent <span class="sort-arrow">${sortIcon('rent')}</span></th>
        <th>Promo / Offer</th>
        <th>Hold</th>
      </tr></thead>
      <tbody>${units.length?units.map(u=>renderDetailRow(u)).join(''):'<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--muted);font-size:13px">No units match the current filters</td></tr>'}</tbody>
    </table>`;
}

function setDetailSort(col){
  const cur=state.detailFilters.sort||'days-desc';
  const[curCol,curDir]=cur.split('-');
  if(curCol===col){
    state.detailFilters.sort=col+'-'+(curDir==='asc'?'desc':'asc');
  } else {
    state.detailFilters.sort=col+'-'+(col==='days'?'desc':'asc');
  }
  renderDetailView();
}

function showFP(fpCode,planName,propName){
  const img=getFPImage(fpCode);
  document.getElementById('fpTitle').textContent=planName||fpCode||'Floor Plan';
  document.getElementById('fpSub').textContent=propName||'';
  const wrap=document.getElementById('fpImgWrap');
  if(img){
    wrap.innerHTML=`<img src="${encodeURI(img)}" alt="${planName||fpCode}" onerror="this.parentNode.innerHTML='<div class=fp-none>Floorplan image not found.<br><small>${encodeURI(img)}</small></div>'">`;

    wrap.innerHTML=`<div class="fp-none">No floorplan available for this unit type.</div>`;
