function closeFP(e){
  if(e&&e.target!==document.getElementById('fpOverlay'))return;
  document.getElementById('fpOverlay').classList.remove('open');
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('fpOverlay').classList.remove('open');});

function renderDetailRow(u){
  const held=holdInfo(u.property,u.unit);
  const promo=getPromo(u.property,u.type||u.fp_code,u.days);
  const calc=calcPromo(u.rent,promo);
  const bp=calcBP(u.rent,promo);
  const{cls,label:stLbl}=availStatusInfo(u);
  const beds=getBeds(u.type||u.fp_code);
  const util=getUtility(u.property,u.unit,u);
  const showCount=getUnitShowCount(u.property,u.unit);
  const pId=state.activeProspectId;
  const p=pId?getProspect(pId):null;
  const unitKey=u.property+'|'+u.unit;
  const isShown=p&&getShownKeys(p).includes(unitKey);

  // Show-in-place for Notice Unrented
  let altNote='';
  if(u.status==='Notice Unrented'){
    const alts=availUnits.filter(x=>x.property===u.property&&(x.fp_code||x.type)===(u.fp_code||u.type)&&x.unit!==u.unit&&x.status!=='Notice Unrented'&&x.days>=0);
    if(alts.length){
      const alt=alts.sort((a,b)=>b.days-a.days)[0];
      altNote=`<span class="in-place-note">📍 show ${alt.unit} instead</span>`;
    }
  }

  // Promo/offer summary for table cell
  let promoCell='';
  if(promo.active&&calc){
    promoCell=`<span style="color:var(--gold);font-weight:700">$${calc.effective.toLocaleString()}/mo</span><br><span style="font-size:10px;color:var(--muted)">−$${calc.monthlyDiscount.toLocaleString()}/mo · ${calc.free} mo free</span>`;
  } else if(bp&&bp.type==='discount'){
    promoCell=`<span style="font-weight:600">$${bp.discounted.toLocaleString()}/mo</span> <span style="font-size:10px;color:var(--muted)">· ${bp.months} mo</span><br><span style="font-size:10px;color:var(--muted)">−$${bp.discount.toLocaleString()}/mo off market</span>`;
  } else if(bp&&bp.type==='gc'){
    promoCell=`<span style="color:var(--muted);font-size:11px">${bp.label}</span>`;
  }

  const holdExpDays=held&&held.hold_until?Math.round((new Date(held.hold_until)-TODAY)/86400000):null;
  const holdUrgent=holdExpDays!==null&&holdExpDays<=2;
  const holdExpStr=held&&held.hold_until?new Date(held.hold_until+'T00:00:00').toLocaleDateString('en-CA',{month:'short',day:'numeric'}):'';
  const holdCell=held?`<span class="hold-pill-sm${holdUrgent?' hold-expiring':''}" onclick="event.stopPropagation()" title="${held.held_by||''}${holdExpStr?' — until '+holdExpStr:''}">🔒 ${holdExpStr}${holdUrgent?' ⚡':''}</span>`:'';
  const prospectCols=p&&!held?`<button class="cp-btn ${isShown?'shown':''}" style="padding:3px 8px;font-size:11px;border-radius:6px" onclick="toggleShown('${unitKey.replace(/'/g,"\\'")}');renderDetailView()">${isShown?'✓':'+ Shown'}</button>`:'';
  const showCountBadge=showCount>0?`<span class="show-count-badge" title="${showCount} prospect${showCount>1?'s':''} shown this unit">${showCount}×</span>`:'';

  const fpCode=u.fp_code||u.type||'';
  const fpImg=getFPImage(fpCode);
  const fpBtn=fpCode?`<button class="fp-btn" onclick="event.stopPropagation();showFP('${fpCode.replace(/'/g,"\\'")}','${(u.floor_plan||fpCode).replace(/'/g,"\\'")}','${(u.property||'').replace(/'/g,"\\'")}')">🗺 Plan</button>`:'';
  return `<tr data-unit="${u.unit}">
    <td style="font-weight:700">${u.unit} ${showCountBadge}</td>
    <td>${bedsLabel(beds)||''}<span style="font-size:10px;color:var(--muted)"> ${u.floor_plan?'· '+u.floor_plan:''}</span>${util?`<br><span class="util-badge" style="background:${util.bg};color:${util.color};font-size:9px">${util.label}</span>`:''}${util&&util.note?`<span style="font-size:9px;color:var(--muted)"> · ${util.note}</span>`:''}
    </td>
    <td><span class="status-chip ${held?'s-hold':cls}" style="font-size:10px;padding:2px 8px">${held?'On Hold':stLbl}</span>${altNote}</td>
    <td class="private-hidden days-cell" onclick="this.classList.toggle('revealed')">${u.days>0?u.days+'d':'—'}</td>
    <td style="font-weight:700">$${u.rent.toLocaleString()}</td>
    <td>${promoCell}</td>
    <td style="white-space:nowrap">${holdCell}${holdCell&&fpBtn?' ':''}${prospectCols}${fpBtn}</td>
  </tr>`;
}

// ─── UNIT CARD ────────────────────────────────────────────────────
function daysToAvail(s){return s?Math.round((new Date(s)-TODAY)/86400000):null;}
function availStatusInfo(u){
  if(u.status==='Notice Unrented'){
    const d=u.date_avail?new Date(u.date_avail+'T00:00:00').toLocaleDateString('en-CA',{month:'short',day:'numeric'}):'';
    return{cls:'s-rr',label:`On Notice${d?' · Avail '+d:''}`};
  }
  if(u.status==='Unrented Not Ready'){
    const d=u.date_avail?new Date(u.date_avail+'T00:00:00').toLocaleDateString('en-CA',{month:'short',day:'numeric'}):'';
    return{cls:'s-unr',label:`Not Ready${d?' · '+d:''}`};
  }
  const d=daysToAvail(u.date_avail);
  if(u.status&&u.status.includes('Rented'))return{cls:'s-rr',label:`Leased · ${u.move_in?new Date(u.move_in+'T00:00:00').toLocaleDateString('en-CA',{month:'short',day:'numeric'}):''}` };
  if(d===null||d<=0)return{cls:'s-ur',label:'Available Now'};
  if(d<=30)return{cls:'s-ur',label:`Avail in ${d}d`};
  return{cls:'s-unr',label:`Avail ${new Date(u.date_avail+'T00:00:00').toLocaleDateString('en-CA',{month:'short',day:'numeric'})}`};
}

function renderUnitCard(u){
  const held=holdInfo(u.property,u.unit);
  const promo=getPromo(u.property,u.type||u.fp_code,u.days);
  const calc=calcPromo(u.rent,promo);
  const bp=calcBP(u.rent,promo);
  const {cls,label:stLbl}=availStatusInfo(u);
  const beds=getBeds(u.type||u.fp_code);
  const pi=propInfo(u.property);
  const util=getUtility(u.property,u.unit,u);
  const features=getFeatures(u.property,u.unit,u.fp_code||u.type);
  const dExp=held?Math.round((new Date(held.hold_until)-TODAY)/86400000):null;
  const score=urgencyScore(u);
  const topUnits=getTopPriority(3).map(t=>t.property+'|'+t.unit);
  const isBrainPick=topUnits.includes(u.property+'|'+u.unit)&&state.smartMode;

  // Prospect state for this unit
  const pId=state.activeProspectId;
  const p=pId?getProspect(pId):null;
  const unitKey=u.property+'|'+u.unit;
  const isShown=p&&getShownKeys(p).includes(unitKey);
  const isInterested=p&&(p.interestedUnits||[]).includes(unitKey);
  const showCount=getUnitShowCount(u.property,u.unit);

  // Show-in-place: if Notice Unrented, find a vacant unit with same floor plan to show instead
  let showInPlaceHtml='';
  if(u.status==='Notice Unrented'){
    const alternates=availUnits.filter(x=>x.property===u.property&&(x.fp_code||x.type)===(u.fp_code||u.type)&&x.unit!==u.unit&&x.status!=='Notice Unrented'&&x.days>=0);
    if(alternates.length){
      const alt=alternates.sort((a,b)=>b.days-a.days)[0];
      showInPlaceHtml=`<div class="show-in-place" onclick="event.stopPropagation();this.closest('.unit-card').scrollIntoView({behavior:'smooth'});document.querySelector('[data-unit=\\'${alt.unit}\\']')?.scrollIntoView({behavior:'smooth',block:'center'})">
        📍 Show <strong>${alt.unit}</strong> in its place · same ${u.floor_plan||'layout'}${alternates.length>1?` (+${alternates.length-1} more)`:''}
      </div>`;
    }
  }

  const holdChip=held?`<span class="hold-chip" onclick="this.closest('.unit-card').classList.toggle('hold-expanded')">🔒 On Hold</span>`:'';
  let holdHtml='';
  if(held)holdHtml=`<div class="hold-banner">
    <span>🔒</span><span class="hold-banner-lbl">ON HOLD — Do Not Offer</span>
    <span class="hold-banner-detail private-hidden" style="margin-left:auto;text-align:right">
      <span style="font-weight:700">${held.held_by}</span>
      ${held.hold_until?`<div class="hold-until-str ${dExp!==null&&dExp<=2?'expires-soon':''}" style="${dExp!==null&&dExp<=2?'color:var(--orange)':''}">Until ${new Date(held.hold_until+'T00:00:00').toLocaleDateString('en-CA',{month:'short',day:'numeric'})}${dExp!==null&&dExp<=2?' ⚡':''}</div>`:''}
    </span></div>`;

  let promoHtml='';
  if(promo.active&&calc)promoHtml=`<div class="promo-banner">
    <div class="promo-tag"><span class="promo-tag-badge">PROMO</span><span class="promo-tag-lbl">${promo.label}</span></div>
    <div class="promo-rates">
      <div><div class="pr-rate-lbl">Market Rent</div><div class="pr-rate-val" style="color:var(--muted)">$${u.rent.toLocaleString()}</div><div class="pr-rate-sub">/month</div></div>
      <div><div class="pr-rate-lbl">Effective Rate</div><div class="pr-rate-val" style="color:var(--gold)">$${calc.effective.toLocaleString()}</div><div class="pr-rate-sub">/mo on 12-mo lease</div></div>
    </div>
    <div class="promo-savings">You save $${calc.savings.toLocaleString()} — ${calc.free} month${calc.free>1?'s':''} free</div>
  </div>`;

  let bpHtml='';
  if(!held){
    if(bp&&bp.type==='gc')bpHtml=`<div class="bp-section"><div class="bp-title">Closing Offer · Last Resort</div>
      <div class="bp-row"><span class="bp-lbl">Offer</span><span class="bp-gc-lbl">${bp.label}</span></div>
      <div class="bp-note">${bp.note}</div></div>`;
    else if(bp&&bp.type==='discount')bpHtml=`<div class="bp-section"><div class="bp-title">Closing Offer · ÷${bp.months}</div>
      <div class="bp-row"><span class="bp-lbl">First ${bp.months} months</span><span class="bp-val">$${bp.discounted.toLocaleString()}/mo</span></div>
      <div class="bp-row"><span class="bp-lbl">Month ${bp.months+1}+</span><span class="bp-val mkt">$${u.rent.toLocaleString()}/mo (market)</span></div>
      <div class="bp-note">${bp.note}</div></div>`;
    else if(promo.bpNote)bpHtml=`<div style="padding:0 12px 8px;font-size:11px;color:var(--muted);font-style:italic">${promo.bpNote}</div>`;
  }

  const featHtml=features.length?`<div class="feat-row">${features.map(f=>`<span class="feat-chip ${f.cls}">${f.label}</span>`).join('')}</div>`:'';

  const brainBadge=isBrainPick?'<span class="brain-badge">⚡ Brain Pick</span>':'';
  const urgentLoss=u.days>0&&state.smartMode&&!isBrainPick?'':(isBrainPick?`<div class="urgent-loss private-hidden">$${score.toLocaleString()} in lost rent</div>`:'');

  const prospectRow=p&&!held?`<div class="card-prospect-row">
    <button class="cp-btn ${isShown?'shown':''}" onclick="toggleShown('${unitKey.replace(/'/g,"\'")}')">
      ${isShown?'✓ Shown':'Mark Shown'}
    </button>
    <button class="cp-btn ${isInterested?'interested':''}" onclick="toggleInterested('${unitKey.replace(/'/g,"\'")}')">
      ${isInterested?'⭐ Interested':'⭐ Add to Prospect'}
    </button>
  </div>`:'';

  return `<div class="unit-card ${held?'on-hold':''} ${isBrainPick?'brain-pick':''}" data-unit="${u.unit}">
    ${holdHtml}
    ${showInPlaceHtml}
    <div class="unit-hdr">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <div class="unit-id">${u.unit}</div>
          ${brainBadge}
          ${holdChip}
          ${showCount>0?`<span class="show-count-badge">Shown ${showCount}×</span>`:''}
        </div>
        ${urgentLoss}
        <div class="unit-bld">${pi.code} · ${pi.display}<span class="unit-bld-addr"> · ${pi.addr}</span></div>
        <div class="unit-type-row">
          <span class="unit-type-txt">${bedsLabel(beds)||''} ${u.floor_plan?'· '+u.floor_plan:''}</span>
          ${util?`<span class="util-badge" style="background:${util.bg};color:${util.color}">${util.label}</span>`:''}
        </div>
      </div>
      <div class="price-block">
        <div class="mkt-rent">$${u.rent.toLocaleString()}</div>
        <div class="mkt-mo">/month</div>
      </div>
    </div>
    ${featHtml}
    ${promoHtml}
    ${bpHtml}
    <div class="unit-footer">
      <div class="unit-meta">
        ${u.area?`<div class="meta-item"><div class="meta-lbl">Area</div><div class="meta-val">${u.area.toLocaleString()} sqft</div></div>`:''}
        ${u.ppsf?`<div class="meta-item"><div class="meta-lbl">$/sqft</div><div class="meta-val">$${u.ppsf.toFixed(2)}</div></div>`:''}
        <div class="meta-item private-hidden"><div class="meta-lbl">Vacant</div><div class="meta-val">${u.days>0?u.days+'d':'—'}</div></div>
      </div>
      <span class="status-chip ${held?'s-hold':cls}">${held?'On Hold':stLbl}</span>
    </div>
    ${prospectRow}
  </div>`;
}

// ─── PROSPECT ACTIONS ─────────────────────────────────────────────
function toggleShown(unitKey){
  const p=getProspect(state.activeProspectId);
  if(!p)return;
  p.shownUnits=p.shownUnits||[];
  const keys=getShownKeys(p);
  const i=keys.indexOf(unitKey);
  if(i>=0)p.shownUnits.splice(i,1);
  else p.shownUnits.push({key:unitKey,date:new Date().toISOString().slice(0,10),reaction:'neutral',notes:''});
  saveProspects(prospects);
  renderDetailView();
}
function toggleInterested(unitKey){
  const p=getProspect(state.activeProspectId);
  if(!p)return;
  p.interestedUnits=p.interestedUnits||[];
  const i=p.interestedUnits.indexOf(unitKey);
  if(i>=0)p.interestedUnits.splice(i,1);else p.interestedUnits.push(unitKey);
  saveProspects(prospects);
  renderDetailView();
  toast(i>=0?'Removed from prospect':'Added to prospect');
}

// ─── PROSPECT PANEL ───────────────────────────────────────────────
function openProspects(){document.getElementById('prospectOverlay').classList.add('open');renderProspectList();}
function closeProspects(e){
  if(e&&e.target!==document.getElementById('prospectOverlay'))return;
  document.getElementById('prospectOverlay').classList.remove('open');
}

let prospectPanelMode='list'; // list | add | detail
let editingProspectId=null;
let newBedSel=[];

function renderProspectList(){
  prospectPanelMode='list';
  document.getElementById('prospectPanelTitle').textContent='Prospects';
  const active=prospects.filter(p=>p.status!=='lost');
  const lost=prospects.filter(p=>p.status==='lost');
  const html=`
    <div class="prospect-list">
      ${active.map(p=>prospectCardHtml(p)).join('')}
      ${lost.length?`<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:8px 0 4px">Lost / Closed</div>`:''}
      ${lost.map(p=>prospectCardHtml(p)).join('')}
    </div>
    <button class="add-prospect-btn" onclick="showAddForm()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add New Prospect
    </button>
    ${state.activeProspectId?`<div style="padding:12px 16px;border-top:1px solid var(--border);margin-top:8px">
      <button style="width:100%;padding:10px;border-radius:10px;border:1.5px solid rgba(0,212,163,.3);background:transparent;color:var(--green);font-size:13px;font-weight:700;cursor:pointer" onclick="setProspectActive(null);closeProspects()">
        ✕ Clear Active Prospect Filter
      </button>
    </div>`:''}`;
  document.getElementById('prospectPanelBody').innerHTML=html;
}

function prospectCardHtml(p){
  const bedStr=p.beds&&p.beds.length?p.beds.map(b=>bedsLabel(b)).join(', '):'Any';
  const budgetStr=p.budgetMax?`Up to $${parseInt(p.budgetMax).toLocaleString()}`:'';
  let moveStr='';
  if(p.moveIn){
    const moveDays=Math.round((new Date(p.moveIn)-TODAY)/86400000);
    const moveDate=new Date(p.moveIn+'T00:00:00').toLocaleDateString('en-CA',{month:'short',day:'numeric'});
    const urgent=p.status!=='lost'&&moveDays>=0&&moveDays<=7;
    moveStr=urgent?`<span style="color:var(--red);font-weight:700">⚠ Move-in ${moveDate} · ${moveDays}d</span>`:`Move-in: ${moveDate}`;
  }
  const shownN=getShownKeys(p).length;
  const intN=(p.interestedUnits||[]).length;
  const isActive=state.activeProspectId===p.id;
  const heat=p.heat||'cool';
  const stage=p.stage||'shown';
  const met=p.met!==false;
  return `<div class="prospect-card ${isActive?'active':''}" onclick="openProspectDetail('${p.id}')">
    <div class="prospect-avatar">${p.name.charAt(0).toUpperCase()}</div>
    <div class="prospect-info">
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        <span class="prospect-name">${p.name}</span>
        <span style="font-size:12px">${HEAT_ICON[heat]||'🔵'}</span>
        ${met?'<span style="font-size:10px;color:var(--green);font-weight:700">MET</span>':''}
      </div>
      <div class="prospect-req">${bedStr}${budgetStr?' · '+budgetStr:''}</div>
      <div class="prospect-stats">${shownN>0?shownN+' shown · ':''}${intN>0?intN+' interested · ':''}${moveStr}</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
      <span class="prospect-status-chip ${p.status==='lost'?'ps-lost':'ps-active'}">${p.status==='lost'?'Lost':'Active'}</span>
      <span class="stage-badge stage-${stage}">${STAGE_LABEL[stage]||stage}</span>
    </div>
  </div>`;
}

function showAddForm(prefillId){
  prospectPanelMode='add';
  editingProspectId=prefillId||null;
  const editing=prefillId?getProspect(prefillId):null;
  newBedSel=editing?[...(editing.beds||[])]:[];
  document.getElementById('prospectPanelTitle').textContent=editing?'Edit Prospect':'New Prospect';
  const beds=[0,1,2,3,4];
  document.getElementById('prospectPanelBody').innerHTML=`<div class="add-form">
    <button class="form-back" onclick="renderProspectList()">← Back</button>
    <div class="form-row"><label class="form-lbl">Name</label>
      <input class="form-inp" id="pName" placeholder="John Smith" value="${editing?editing.name:''}"></div>
    <div class="form-row"><label class="form-lbl">Bedrooms Interested In</label>
      <div class="form-beds">
        ${beds.map(b=>`<button class="bed-toggle ${newBedSel.includes(b)?'sel':''}" onclick="toggleBedSel(${b},this)">${bedsLabel(b)||'Studio'}</button>`).join('')}
      </div></div>
    <div class="form-row"><label class="form-lbl">Max Budget (rent/mo)</label>
      <input class="form-inp" id="pBudget" type="number" placeholder="e.g. 2500" value="${editing&&editing.budgetMax?editing.budgetMax:''}"></div>
    <div class="form-row"><label class="form-lbl">Target Move-in</label>
      <input class="form-inp" id="pMoveIn" type="date" value="${editing?editing.moveIn:''}"></div>
    <div class="form-row"><label class="form-lbl">Notes</label>
      <textarea class="form-inp pd-notes" id="pNotes" placeholder="Has a dog, wants laundry, prefers higher floor…">${editing?editing.notes:''}  </textarea></div>
    <button class="form-save" onclick="saveProspect()">Save Prospect</button>
  </div>`;
}

function toggleBedSel(b,btn){
  const i=newBedSel.indexOf(b);
  if(i>=0)newBedSel.splice(i,1);else newBedSel.push(b);
  btn.classList.toggle('sel',newBedSel.includes(b));
}

function saveProspect(){
  const name=document.getElementById('pName').value.trim();
  if(!name){alert('Please enter a name.');return;}
  if(editingProspectId){
    const p=getProspect(editingProspectId);
    p.name=name;p.beds=newBedSel;
    p.budgetMax=document.getElementById('pBudget').value?parseInt(document.getElementById('pBudget').value):null;
    p.moveIn=document.getElementById('pMoveIn').value||null;
    p.notes=document.getElementById('pNotes').value.trim();
  }else{
    prospects.push({id:'p'+Date.now(),name,beds:newBedSel,budgetMax:document.getElementById('pBudget').value?parseInt(document.getElementById('pBudget').value):null,moveIn:document.getElementById('pMoveIn').value||null,notes:document.getElementById('pNotes').value.trim(),status:'active',shownUnits:[],interestedUnits:[],createdAt:new Date().toISOString()});
  }
  saveProspects(prospects);
  toast(editingProspectId?'Prospect updated':'Prospect added');
  renderProspectList();
}

function buildShowingUnitRows(pid,propName){
  if(!propName)return'';
  const p=getProspect(pid);
  const units=availUnits.filter(u=>u.property===propName);
  if(!units.length)return`<div style="font-size:12px;color:var(--muted);padding:8px 0">No available units for this property.</div>`;
  return units.map(u=>{
    const key=u.property+'|'+u.unit;
    const beds=getBeds(u.type||u.fp_code);
    const promo=getPromo(u.property,u.type||u.fp_code,u.days);
    const calc=calcPromo(u.rent,promo);
    const bp=calcBP(u.rent,promo);
    const isShown=p&&getShownKeys(p).includes(key);
    const fpCode=u.fp_code||u.type||'';
    const hasFB=fpCode.includes('_FB');
    const rateStr=calc?`<span style="color:var(--gold);font-weight:700">$${calc.effective.toLocaleString()}/mo eff.</span> <span style="color:var(--muted);font-size:10px">(${promo.label})</span>`:
      `<span style="font-weight:600">$${u.rent.toLocaleString()}/mo</span>`;
    const bpStr=bp&&bp.type==='discount'?`<span style="font-size:10px;color:var(--muted)"> · Closing ÷${bp.months||8}: $${bp.discounted.toLocaleString()}</span>`:
      bp&&bp.type==='gc'?`<span style="font-size:10px;color:var(--muted)"> · ${bp.label}</span>`:'';
    return`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)">
      <input type="checkbox" style="accent-color:var(--teal);width:16px;height:16px;cursor:pointer" ${isShown?'checked':''} onchange="toggleShown('${key.replace(/'/g,"\\'")}');buildShowingUnitRows&&(document.getElementById('showingUnits_${pid}').innerHTML=buildShowingUnitRows('${pid}',document.getElementById('showingPropSel_${pid}').value))">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span style="font-weight:700;font-size:13px">${u.unit}</span>
          <span style="font-size:11px;color:var(--muted)">${bedsLabel(beds)||'Studio'}</span>
          ${hasFB?'<span style="font-size:10px;background:rgba(157,127,255,.1);color:var(--purple);padding:1px 6px;border-radius:5px">🏠 FB</span>':''}
          ${u.days>0?`<span style="font-size:10px;color:var(--muted)">${u.days}d vacant</span>`:''}
        </div>
        <div style="font-size:12px;margin-top:2px">${rateStr}${bpStr}</div>
      </div>
    </div>`;
  }).join('');
}

function onShowingPropChange(pid){
  const sel=document.getElementById('showingPropSel_'+pid);
  const container=document.getElementById('showingUnits_'+pid);
  if(container)container.innerHTML=buildShowingUnitRows(pid,sel.value);
}

const HEAT_ICON={hot:'🔴',warm:'🟡',cool:'🔵',cold:'⚫'};
const REACTION_ICON={loved:'❤️',liked:'👍',neutral:'•',disliked:'👎'};
const STAGE_LABEL={lead:'Lead',shown:'Shown',app_pending:'App Pending',withdrew:'Withdrew'};

function toggleMet(id){
  const p=getProspect(id);
  if(p){p.met=!p.met;saveProspects(prospects);openProspectDetail(id);}
}
function setReaction(id,key,reaction){
  const p=getProspect(id);
  if(!p)return;
  const entry=p.shownUnits.find(s=>(typeof s==='string'?s:s.key)===key);
  if(entry&&typeof entry==='object')entry.reaction=reaction;
  saveProspects(prospects);
  openProspectDetail(id);
}

function openProspectDetail(id){
  const p=getProspect(id);
  if(!p)return;
  document.getElementById('prospectPanelTitle').textContent=p.name;
  const bedStr=p.beds&&p.beds.length?p.beds.map(b=>bedsLabel(b)).join(', '):'Any';
  const budgetStr=p.budgetMax?`Up to $${parseInt(p.budgetMax).toLocaleString()}`:'';
  const heat=p.heat||'cool';
  const stage=p.stage||'shown';
  const met=p.met!==false;

  const shown=getShownKeys(p).length?getShownKeys(p).map(key=>{
    const entry=getShownEntry(p,key);
    const [prop,unit]=key.split('|');
    const u=availUnits.find(x=>x.property===prop&&x.unit===unit);
    const pi=propInfo(prop);
    const promo=u?getPromo(prop,u.type||u.fp_code,u.days):null;
    const calc=u&&promo?calcPromo(u.rent,promo):null;
    const bp=u&&promo?calcBP(u.rent,promo):null;
    const rateStr=calc?`$${calc.effective.toLocaleString()}/mo eff. (${promo.label})`:(u?`$${u.rent.toLocaleString()}/mo`:'');
    const bpStr=bp?` · Closing ÷${bp.months||8}: $${bp.discounted.toLocaleString()}`:'';
    const reaction=entry&&typeof entry==='object'?entry.reaction:'neutral';
    const dateStr=entry&&typeof entry==='object'&&entry.date?` · ${entry.date.slice(5).replace('-','/')} `:'';
    const entryNotes=entry&&typeof entry==='object'&&entry.notes?`<div style="font-size:10px;color:var(--muted);margin-top:2px;font-style:italic">${entry.notes}</div>`:'';
    const escKey=key.replace(/'/g,"\\'");
    return `<div class="pd-unit-row">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span class="pd-unit-lbl">${unit}</span>
          <span style="font-size:11px;color:var(--muted)">${pi.code} · ${pi.display}</span>
          <span style="font-size:13px" title="${reaction}">${REACTION_ICON[reaction]||'•'}</span>
          <span style="font-size:10px;color:var(--muted)">${dateStr}</span>
        </div>
        ${rateStr?`<div class="pd-unit-sub">${rateStr}${bpStr}</div>`:''}
        ${entryNotes}
        <div style="display:flex;gap:4px;margin-top:4px">
          ${['loved','liked','neutral','disliked'].map(r=>`<span style="font-size:13px;cursor:pointer;opacity:${reaction===r?1:0.3}" onclick="setReaction('${id}','${escKey}','${r}')" title="${r}">${REACTION_ICON[r]}</span>`).join('')}
        </div>
      </div>
      <button class="pd-unit-action remove" onclick="toggleShown('${escKey}');openProspectDetail('${id}')">✕</button>
    </div>`;
  }).join(''):'';

  const interested=(p.interestedUnits||[]).map(key=>{
    const [prop,unit]=key.split('|');
    const u=availUnits.find(x=>x.property===prop&&x.unit===unit);
    const pi=propInfo(prop);
    return `<div class="pd-unit-row">
      <div><div class="pd-unit-lbl">${unit}</div><div class="pd-unit-sub">${pi.code} · ${pi.display}${u?` · $${u.rent.toLocaleString()}/mo`:''}</div></div>
      <button class="pd-unit-action remove" onclick="toggleInterested('${key.replace(/'/g,"\'")}');openProspectDetail('${id}')">✕</button>
    </div>`;
  }).join('');

  const propOptions=Object.entries(PROPS).map(([n,pi])=>`<option value="${n}">${pi.code} · ${pi.display}</option>`).join('');
  const dealbreakers=p.dealbreakers&&p.dealbreakers.length?`<div style="font-size:11px;color:var(--red);margin-top:4px">✗ ${p.dealbreakers.join(' · ')}</div>`:'';
  const mustHave=p.mustHave&&p.mustHave.length?`<div style="font-size:11px;color:var(--green);margin-top:2px">✓ ${p.mustHave.join(' · ')}</div>`:'';

  document.getElementById('prospectPanelBody').innerHTML=`<div class="prospect-detail">
    <div class="pd-hdr">
      <div class="pd-avatar">${p.name.charAt(0).toUpperCase()}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <div class="pd-name">${p.name}</div>
          <span style="font-size:14px">${HEAT_ICON[heat]||'🔵'}</span>
          <span class="stage-badge stage-${stage}">${STAGE_LABEL[stage]||stage}</span>
        </div>
        <div class="pd-req">${bedStr}${budgetStr?' · '+budgetStr:''}</div>
        ${mustHave}${dealbreakers}
      </div>
      <button class="pd-back" onclick="renderProspectList()">←</button>
    </div>
    <div class="pd-section" style="padding:10px 16px;display:flex;gap:8px;align-items:center;border-bottom:1px solid var(--border)">
      <button style="flex:1;padding:8px;border-radius:8px;border:1.5px solid ${met?'var(--green)':'var(--border)'};background:${met?'rgba(0,212,163,.12)':'transparent'};color:${met?'var(--green)':'var(--muted)'};font-size:12px;font-weight:700;cursor:pointer" onclick="toggleMet('${id}')">
        ${met?'✓ Met in Person':'Mark as Met'}
      </button>
      <button style="flex:1;padding:8px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer" onclick="setStatus('${id}','${p.status==='active'?'lost':'active'}')">
        ${p.status==='active'?'Mark Lost':'Reactivate'}
      </button>
    </div>
    <div class="pd-section">
      <div class="pd-section-title">🏠 Log a Showing</div>
      <select id="showingPropSel_${id}" class="dfsel" style="width:100%;margin-bottom:8px;font-size:13px;padding:8px 10px" onchange="onShowingPropChange('${id}')">
        <option value="">Select a property…</option>${propOptions}
      </select>
      <div id="showingUnits_${id}" style="max-height:220px;overflow-y:auto"></div>
    </div>
    ${shown?`<div class="pd-section"><div class="pd-section-title">👁 Shown Units (${getShownKeys(p).length})</div>${shown}</div>`:''}
    ${interested?`<div class="pd-section"><div class="pd-section-title">⭐ Interested Units</div>${interested}</div>`:''}
    ${p.notes||p.nextAction?`<div class="pd-section">
      <div class="pd-section-title">Notes</div>
      ${p.nextAction?`<div style="font-size:12px;color:var(--gold);margin-bottom:8px;line-height:1.4">→ ${p.nextAction}</div>`:''}
      <textarea class="pd-notes" onblur="saveNote('${id}',this.value)">${p.notes||''}</textarea>
    </div>`:'<div class="pd-section"><div class="pd-section-title">Notes</div><textarea class="pd-notes" onblur="saveNote(\'${id}\',this.value)"></textarea></div>'}
    <div class="pd-section" style="border-bottom:none">
      <button style="display:flex;align-items:center;gap:8px;width:100%;padding:11px;border-radius:10px;border:1.5px solid var(--border);background:transparent;color:var(--teal);font-size:13px;font-weight:700;cursor:pointer;margin-bottom:8px" onclick="setProspectActive('${id}');closeProspects()">
        ${state.activeProspectId===id?'✓ Active — viewing matched units':'🔍 Filter Inventory for This Prospect'}
      </button>
      <button style="display:flex;align-items:center;gap:8px;width:100%;padding:11px;border-radius:10px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;margin-bottom:8px" onclick="showAddForm('${id}')">
        ✏️ Edit Prospect
      </button>
      <button class="pd-del" onclick="deleteProspect('${id}')">Delete Prospect</button>
    </div>
  </div>`;
}

function setStatus(id,status){
  const p=getProspect(id);
  if(p){p.status=status;saveProspects(prospects);openProspectDetail(id);}
}
function saveNote(id,val){
  const p=getProspect(id);
  if(p){p.notes=val.trim();saveProspects(prospects);}
}
function deleteProspect(id){
  if(!confirm('Delete this prospect?'))return;
  prospects=prospects.filter(p=>p.id!==id);
  saveProspects(prospects);
  if(state.activeProspectId===id)setProspectActive(null);
  renderProspectList();
  toast('Prospect deleted');
}

// ─── IMPORT / EXCEL PARSING ───────────────────────────────────────
let importFiles={avail:null,vac:null,hold:null};

function openImport(){document.getElementById('importOverlay').classList.add('open');}
function closeImport(e){
  if(e&&e.target!==document.getElementById('importOverlay'))return;
  document.getElementById('importOverlay').classList.remove('open');
}

function loadFile(input,type){
  const file=input.files[0];
  if(!file)return;
  const nameEl=document.getElementById({avail:'availFileName',vac:'vacFileName',hold:'holdFileName'}[type]);
  nameEl.textContent=file.name;
  nameEl.classList.add('loaded');
  importFiles[type]=file;
}

async function applyImport(){
  const btn=document.getElementById('importApplyBtn');
  const status=document.getElementById('importStatus');
  if(!importFiles.avail&&!importFiles.vac&&!importFiles.hold){
    status.textContent='Please select at least one file.';
    status.className='import-status err';
    return;
  }
  btn.disabled=true;
  status.textContent='Parsing files…';
  status.className='import-status';

  try{
    if(typeof XLSX==='undefined'){
      status.textContent='SheetJS not loaded — check your internet connection.';
      status.className='import-status err';
      btn.disabled=false;
      return;
    }

    if(importFiles.avail){
      const wb=XLSX.read(await importFiles.avail.arrayBuffer(),{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      if(rows.length){
        DATA.pipeline=parseAvailRows(rows);
        // Re-merge
        mergeData();
        status.textContent=`✓ Loaded ${DATA.pipeline.length} available units`;
      }
    }
    if(importFiles.vac){
      const wb=XLSX.read(await importFiles.vac.arrayBuffer(),{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      if(rows.length){DATA.vacancy=parseVacRows(rows);mergeData();}
    }
    if(importFiles.hold){
      const wb=XLSX.read(await importFiles.hold.arrayBuffer(),{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      if(rows.length){
        DATA.holds=parseHoldRows(rows);
        Object.keys(HOLD_MAP).forEach(k=>delete HOLD_MAP[k]);
        DATA.holds.forEach(h=>{HOLD_MAP[h.property+'|'+h.unit]=h;});
      }
    }

    const today=new Date();
    const dateStr=today.toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'numeric'});
    document.getElementById('hdrSub').textContent=dateStr+' · Updated';
    status.textContent=`✓ Data updated — ${DATA.pipeline.length} units, ${DATA.vacancy.length} vacancies, ${DATA.holds.length} holds`;
    status.className='import-status ok';
    btn.disabled=false;
    importFiles={avail:null,vac:null,hold:null};
    setTimeout(()=>{closeImport();renderPropList();},1800);
  }catch(err){
    status.textContent='Error parsing file: '+err.message;
    status.className='import-status err';
    btn.disabled=false;
  }
}

function mergeData(){
  const vm={};
  DATA.vacancy.forEach(v=>{vm[v.property+'|'+v.unit]=v;});
  availUnits=DATA.pipeline.map(p=>{
    const v=vm[p.property+'|'+p.unit]||{};
    return{...p,type:v.type||p.fp_code||'',status:v.status||p.status||'Unrented Ready',days:v.days||p.days||0,move_in:v.move_in||''};
  });
}

// Flexible column parser — tries multiple possible column names
function col(row,candidates){for(const c of candidates){if(row[c]!==undefined&&row[c]!=='')return row[c];}return'';}

function parseAvailRows(rows){
  return rows.map(r=>{
    const rent=parseFloat(String(col(r,['Rent','Market Rent','market_rent','RENT','rent','Asking Rent'])).replace(/[^0-9.]/g,''))||0;
    const area=parseFloat(String(col(r,['Area','Sq Ft','sqft','Square Feet','area','SQFT'])).replace(/[^0-9.]/g,''))||0;
    return{
      property:String(col(r,['Property','property','Building','PROPERTY'])).trim(),
      unit:String(col(r,['Unit','unit','Unit #','UNIT','Unit Number'])).trim(),
      fp_code:String(col(r,['Floor Plan Code','fp_code','FP Code','Floor Plan ID','Type Code'])).trim(),
      floor_plan:String(col(r,['Floor Plan','floor_plan','Plan Name','Floor Plan Name'])).trim(),
      area,rent,
      date_avail:String(col(r,['Date Available','date_avail','Available Date','Avail Date','Date Avail'])).trim(),
      hold_until:String(col(r,['Hold Until','hold_until','Hold Expiry'])).trim(),
      ppsf:area&&rent?Math.round((rent/area)*100)/100:0,
    };
  }).filter(r=>r.property&&r.unit&&r.rent>0);
}

function parseVacRows(rows){
  return rows.map(r=>{
    const rent=parseFloat(String(col(r,['Rent','Market Rent','rent','RENT','Asking Rent'])).replace(/[^0-9.]/g,''))||0;
    const days=parseInt(String(col(r,['Days Vacant','days','Days','DAYS','Vacancy Days'])).replace(/[^0-9]/g,''))||0;
    return{
      property:String(col(r,['Property','property','Building','PROPERTY'])).trim(),
      unit:String(col(r,['Unit','unit','Unit #','UNIT'])).trim(),
      type:String(col(r,['Type','Unit Type','type','TYPE','Floor Plan Code'])).trim(),
      status:String(col(r,['Status','status','STATUS','Vacancy Status'])).trim()||'Unrented Ready',
      rent,days,
      move_in:String(col(r,['Move In','move_in','Move-In','Lease Start'])).trim(),
    };
  }).filter(r=>r.property&&r.unit);
}

function parseHoldRows(rows){
  return rows.map(r=>{
    const rent=parseFloat(String(col(r,['Rent','Market Rent','rent','RENT'])).replace(/[^0-9.]/g,''))||0;
    const beds=parseInt(String(col(r,['Bedrooms','beds','Bed','BR'])).replace(/[^0-9]/g,''))||null;
    return{
      property:String(col(r,['Property','property','Building','PROPERTY'])).trim(),
      unit:String(col(r,['Unit','unit','Unit #','UNIT'])).trim(),
      held_by:String(col(r,['Held By','held_by','Agent','Leasing Agent','AGENT','Reserved By'])).trim(),
      hold_until:String(col(r,['Hold Until','hold_until','Hold Expiry','Expiry','Expiration Date'])).trim(),
      type:String(col(r,['Type','Hold Type','type','Unit Type'])).trim(),
      bedrooms:beds,rent,
    };
  }).filter(r=>r.property&&r.unit);
}

// ─── VACANCY RENDER ───────────────────────────────────────────────
const BKT_COLORS={'0-30':'#0F7A6E','31-60':'#1A7A4A','61-90':'#8A5A20','91-180':'#8A3A20','180+':'#8A1A22'};
const BKT_CLASS={'0-30':'bkt0','31-60':'bkt30','61-90':'bkt60','91-180':'bkt90','180+':'bkt180'};

function initVacFilters(){
  const sel=document.getElementById('vacProp');
  [...new Set(DATA.vacancy.map(d=>d.property))].sort().forEach(p=>{
    const o=document.createElement('option');o.value=p;o.textContent=propInfo(p).code+' · '+propInfo(p).display;
    sel.appendChild(o);
  });
}

function getFilteredVac(){
  let data=[...DATA.vacancy];
  const prop=document.getElementById('vacProp')?.value||'';
  if(prop)data=data.filter(d=>d.property===prop);
  const sz=document.getElementById('vacSize')?.value||'';
  if(sz!=='')data=data.filter(d=>getBeds(d.type)===parseInt(sz));
  const st=document.getElementById('vacStatus')?.value||'';
  if(st)data=data.filter(d=>d.status===st);
  const bkt=document.getElementById('vacBucket')?.value||'';
  if(bkt)data=data.filter(d=>ageBucket(d.days)===bkt);
  const sort=document.getElementById('vacSort')?.value||'days-desc';
  data.sort((a,b)=>{
    if(sort==='days-desc')return b.days-a.days;
    if(sort==='unit-asc')return a.unit.localeCompare(b.unit,undefined,{numeric:true,sensitivity:'base'});
    if(sort==='rent-asc')return a.rent-b.rent;
    if(sort==='rent-desc')return b.rent-a.rent;
    if(sort==='lost-desc')return(b.rent*b.days)-(a.rent*a.days);
    return 0;
  });
  return data;
}

function renderVac(){
  // KPIs
  const total=DATA.vacancy.length;
  const totalRent=DATA.vacancy.reduce((s,v)=>s+v.rent,0);
  const avgDays=Math.round(DATA.vacancy.reduce((s,v)=>s+v.days,0)/total);
  const lostRent=DATA.vacancy.reduce((s,v)=>s+Math.round(v.rent/30*v.days),0);
  document.getElementById('vacDate').textContent='Jun 12, 2026';
  document.getElementById('vacKpis').innerHTML=`
    <div class="kpi red"><div class="kpi-lbl">Vacant Units</div><div class="kpi-val">${total}</div><div class="kpi-sub">across portfolio</div></div>
    <div class="kpi gold"><div class="kpi-lbl">Potential Rent</div><div class="kpi-val">$${Math.round(totalRent/1000)}k</div><div class="kpi-sub">/month if full</div></div>
    <div class="kpi teal"><div class="kpi-lbl">Avg Days Vacant</div><div class="kpi-val">${avgDays}</div><div class="kpi-sub">days</div></div>
    <div class="kpi red"><div class="kpi-lbl">Lost Rent</div><div class="kpi-val">$${Math.round(lostRent/1000)}k</div><div class="kpi-sub">est. total lost</div></div>`;

  // Aging buckets
  const bkts=['0-30','31-60','61-90','91-180','180+'];
  const bktCounts={};
  DATA.vacancy.forEach(v=>{const b=ageBucket(v.days);bktCounts[b]=(bktCounts[b]||0)+1;});
  const activeBkt=document.getElementById('vacBucket')?.value||'all';
  document.getElementById('vacAging').innerHTML=bkts.map(b=>`
    <div class="age-bkt ${BKT_CLASS[b]} ${activeBkt!=='all'&&activeBkt!==b?'dim':''}" onclick="toggleVacBucket('${b}')">
      <div class="age-bkt-lbl">${b} days</div>
      <div class="age-bkt-count">${bktCounts[b]||0}</div>
      <div class="age-bkt-pct">${total?Math.round((bktCounts[b]||0)/total*100):0}%</div>
    </div>`).join('');

  // Holds panel
  const holdsSorted=[...DATA.holds].sort((a,b)=>a.unit.localeCompare(b.unit,undefined,{numeric:true,sensitivity:'base'}));
  const holdsCollapsed=state.holdsCollapsed||false;
  document.getElementById('holdsPanel').innerHTML=`<div class="holds-panel${holdsCollapsed?' collapsed':''}">
    <div class="holds-panel-hdr" onclick="state.holdsCollapsed=!state.holdsCollapsed;renderVac()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <span class="holds-panel-title">Units On Hold</span>
      <span class="holds-panel-count">${DATA.holds.length} units</span>
      <span class="holds-panel-chevron">▾</span>
    </div>
    <div class="hold-rows">
      ${holdsSorted.map(h=>{
        const dExp=Math.round((new Date(h.hold_until)-TODAY)/86400000);
        const expStr=h.hold_until?new Date(h.hold_until+'T00:00:00').toLocaleDateString('en-CA',{month:'short',day:'numeric'}):'-';
        const soon=dExp>=0&&dExp<=2;
        const pi=propInfo(h.property);
        return `<div class="hold-row">
          <div class="hold-unit-lbl">${h.unit}</div>
          <div class="hold-prop-lbl">${pi.code} · ${pi.display}</div>
          <div class="hold-agent-lbl">${h.held_by||'—'}</div>
          <div class="hold-exp-lbl ${soon?'soon':''}">Until ${expStr}${soon?' ⚡':''}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;

  // Table
  const data=getFilteredVac();
  const per=25,pages=Math.ceil(data.length/per);
  const pg=Math.min(state.vacPage,pages||1);
  state.vacPage=pg;
  const slice=data.slice((pg-1)*per,pg*per);
  document.getElementById('vacTableBody').innerHTML=slice.map(v=>{
    const held=isOnHold(v.property,v.unit);
    const lost=Math.round(v.rent/30*v.days);
    const beds=getBeds(v.type);
    const fpCode=v.type||'';
    const fpPlanName=v.floor_plan||fpCode;
    const fpBtn=fpCode?`<button class="fp-btn" onclick="event.stopPropagation();showFP('${fpCode.replace(/'/g,"\\'")}','${fpPlanName.replace(/'/g,"\\'")}','${(v.property||'').replace(/'/g,"\\'")}')">🗺 Plan</button>`:'';
    const vPromo=getPromo(v.property,v.type,v.days);
    const vCalc=calcPromo(v.rent,vPromo);
    const vBP=calcBP(v.rent,vPromo);
    let rentCell=`<span style="font-weight:700">$${v.rent.toLocaleString()}</span>`;
    if(vPromo.active&&vCalc){
      rentCell+=`<br><span style="color:var(--gold);font-size:10px;font-weight:600">$${vCalc.effective.toLocaleString()} eff</span><span style="color:var(--muted);font-size:10px"> · −$${vCalc.monthlyDiscount.toLocaleString()} · ${vCalc.free}mo free</span>`;
    } else if(vBP&&vBP.type==='discount'){
      rentCell+=`<br><span style="color:var(--muted);font-size:10px">$${vBP.discounted.toLocaleString()} · −$${vBP.discount.toLocaleString()} · ${vBP.months}mo</span>`;
    }
    return `<tr>
      <td style="font-weight:700">${v.unit}</td>
      <td>${propInfo(v.property).code} · ${propInfo(v.property).display}</td>
      <td>${bedsLabel(beds)||v.type}</td>
      <td><span class="status-chip ${v.status==='Unrented Ready'?'s-ur':v.status==='Rented Ready'?'s-rr':'s-unr'}">${v.status}</span></td>
      <td class="private-hidden">${v.days}d</td>
      <td>${rentCell}</td>
      <td class="private-hidden" style="color:var(--red)">$${lost.toLocaleString()}</td>
      <td style="white-space:nowrap">${held?'<span class="hold-pill">🔒 Hold</span> ':'' }${fpBtn}</td>
    </tr>`;
  }).join('');
  document.getElementById('vacPagination').innerHTML=pages>1?`
    <button class="pg-btn" onclick="state.vacPage--;renderVac()" ${pg<=1?'disabled':''}>←</button>
    <span class="pg-info">Page ${pg} of ${pages} · ${data.length} units</span>
    <button class="pg-btn" onclick="state.vacPage++;renderVac()" ${pg>=pages?'disabled':''}>→</button>`:`<span class="pg-info">${data.length} units</span>`;
}
function toggleVacBucket(b){
  state.vacBucketFilter=state.vacBucketFilter===b?null:b;
  document.getElementById('vacBucket').value=state.vacBucketFilter||'';
  renderVac();
}

// ─── TOAST ────────────────────────────────────────────────────────
let toastTimer=null;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2200);
}

mergeData();
renderPropList();
initVacFilters();
updateVacPrivacy();
</script>
